<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capitulo 5</title>
    <link rel="stylesheet" href="form.css">
</head>

<body> 
    <nav>
        <a href="../../../../index.html">Home - Principal</a>
        <br>
        <a href="../../../../cap05.html">Home - Capitulo 5</a>
    </nav>

    <img src="form1_back.jpg" alt="formulario">

    <main>
        <h1>Dados da conta</h1>
        <hr>

        <form action="#">
            <fieldset>
                <legend>Dados Pessoais:</legend>

                <div>
                    <label align="left" for="nome">Nome:</label>
                    <input type="text" id="nome" size="50">
                </div>
                <br>
                <div>
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" size="50">
                </div>
            </fieldset>

            <fieldset>
                <legend>Dados da Conta:</legend>

                <div>
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" size="50">
                </div>
                <br>
                <div>
                    <label for="frase">Frase opcional:</label>
                    <input type="text" id="frase" size="50">
                </div>
            </fieldset>
            
            <br>
            <button type="submit">Enviar</button>
        </form>
    </main>

</body>
</html>
