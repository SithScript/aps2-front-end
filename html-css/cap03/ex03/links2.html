        h2{

        }

        p a:link{
            text-decoration: none;
            color: #7faeb7;
            font-weight: bold;
        }

        p a:visited{
            color: #c9e0e5;
        }

        p a:hover{
            color: #ffa700;
        }

        img:hover{  /* QUando o mouse passa pelos botões aparece uma moldura. Começa aqui */
            border: #ffa700 solid 3px;
        }

        /* Primeira maneira usando first-of-type */
      /*  a:first-of-type img:hover{ 
            border-radius: 25px 0 0 25px;
        } */

        /* Segunda maneira usando nth-child  */
        a:nth-child(1) img:hover{
            border-radius: 25px 0 0 25px;
        }

      /*  a:last-of-type img:hover{
            border-radius: 0 25px 25px 0;
        } */

        a:nth-child(3) img:hover{
            border-radius: 0 25px 25px 0;
        } /* A moldura termina aqui. Foram colocadas duas formas de faze-las */


    </style>
